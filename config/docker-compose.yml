version: '3.8'

services:
  database:
    image: postgres:15
    container_name: saloonmarketplace-database-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.1.1
    container_name: saloonmarketplace-directus-1
    restart: unless-stopped
    environment:
      KEY: ${KEY}
      SECRET: ${SECRET}
      DB_CLIENT: 'pg'
      DB_HOST: 'database'
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_URL: ${PUBLIC_URL}
      CORS_ORIGIN: 'http://localhost:3000,http://localhost:80'
      REFRESH_TOKEN_COOKIE_DOMAIN: 'localhost'
      REFRESH_TOKEN_COOKIE_SECURE: 'false'
      STORAGE_LOCATIONS: 'local'
      STORAGE_LOCAL_ROOT: 'uploads'
    ports:
      - "8055:8055"
    volumes:
      - ../data/uploads:/directus/uploads
      - ../data/database:/directus/database
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8055/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: saloonmarketplace-frontend-1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_DIRECTUS_URL: ${NEXT_PUBLIC_DIRECTUS_URL}
      DIRECTUS_INTERNAL_URL: 'http://directus:8055'
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      directus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: saloonmarketplace-nginx-1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../data/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - directus

volumes:
  postgres_data:
  directus_uploads:
  directus_database:
