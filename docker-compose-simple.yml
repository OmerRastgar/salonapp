version: '3.8'

services:
  database:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: K8$mN#pL2@qR9vW5!zX
      POSTGRES_DB: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11.1.1
    container_name: saloonmarketplace-directus-1
    restart: unless-stopped
    environment:
      KEY: 7f3b9c2e6a8d1f5e9b4c0a3d7e8f2a6b9c1d5e8f0a3b7c2d6e9f1a4b8c3d7e2f
      SECRET: 9a4f7c2e8b1d5f6a3c9e0b7d4f8a2c5e9b1d6f3a7c0e4b8d2f5a9c1e7b3d6f
      DB_CLIENT: 'pg'
      DB_HOST: 'database'
      DB_PORT: 5432
      DB_DATABASE: postgres
      DB_USER: admin
      DB_PASSWORD: K8$mN#pL2@qR9vW5!zX
      ADMIN_EMAIL: admin@saloonmarketplace.com
      ADMIN_PASSWORD: Admin@2024!Secure#Access
      PUBLIC_URL: http://localhost:8055
      CORS_ENABLED: 'true'
      CORS_ORIGIN: 'http://localhost:3000,http://localhost:80'
      CORS_CREDENTIALS: 'true'
      CORS_METHODS: 'GET,POST,PUT,PATCH,DELETE,OPTIONS'
      CORS_ALLOWED_HEADERS: 'Content-Type,Authorization'
      REFRESH_TOKEN_COOKIE_DOMAIN: 'localhost'
      REFRESH_TOKEN_COOKIE_SECURE: 'false'
      STORAGE_LOCATIONS: 'local'
      STORAGE_LOCAL_ROOT: 'uploads'
    ports:
      - "8055:8055"
    volumes:
      - ./data/uploads:/directus/uploads
      - ./data/database:/directus/database
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8055/server/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saloonmarketplace-frontend-1
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8055
      DIRECTUS_INTERNAL_URL: 'http://directus:8055'
      ADMIN_EMAIL: admin@saloonmarketplace.com
      ADMIN_PASSWORD: Admin@2024!Secure#Access
    ports:
      - "3000:3000"
    depends_on:
      directus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  directus_uploads:
  directus_database:
