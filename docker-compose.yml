networks:
  marketplace-network:
    driver: bridge

services:
  database:
    image: postgres:15-alpine
    restart: always
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    networks:
      - marketplace-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - marketplace-network


  directus:
    image: directus/directus:11.1.1
    environment:
      - KEY='${KEY}'
      - SECRET='${SECRET}'
      - DB_CLIENT=pg
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PUBLIC_URL=${PUBLIC_URL}
      - CORS_ENABLED=true
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CORS_METHODS=GET,POST,PATCH,DELETE,OPTIONS
      - CORS_ALLOWED_HEADERS=Content-Type,Authorization
      - CORS_CREDENTIALS=true
      - STORAGE_LOCATIONS=local
      - STORAGE_LOCAL_DRIVER=local
      - STORAGE_LOCAL_ROOT=/directus/uploads
      - TELEMETRY_ENABLED=false
      # Use a single worker to save memory on the VPS
      - PM2_CLUSTER_MODE=false
    mem_limit: 1G
    ports:
      - "8055:8055"
    volumes:
      - ./data/uploads:/directus/uploads
    depends_on:
      - database
    networks:
      - marketplace-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
    restart: always
    environment:
      - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
      - DIRECTUS_INTERNAL_URL=${DIRECTUS_INTERNAL_URL}
      - DIRECTUS_TOKEN=${DIRECTUS_TOKEN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - directus
    networks:
      - marketplace-network
