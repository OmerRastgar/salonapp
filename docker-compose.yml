networks:
  marketplace-network:
    driver: bridge

services:
  database:
    image: postgres:15-alpine
    restart: always
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "5432:5432"
    networks:
      - marketplace-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "8055:8055"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - marketplace-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_DIRECTUS_URL=${NEXT_PUBLIC_DIRECTUS_URL}
      - DIRECTUS_INTERNAL_URL=${DIRECTUS_INTERNAL_URL:-http://directus:8055}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - directus
    networks:
      - marketplace-network

  directus:
    image: directus/directus:11.1.1
    environment:
      - KEY=${KEY}
      - SECRET=${SECRET}
      - DB_CLIENT=pg
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PUBLIC_URL=http://localhost:8055
      - CORS_ENABLED=true
      - CORS_ORIGIN=true
    depends_on:
      - database
    networks:
      - marketplace-network
